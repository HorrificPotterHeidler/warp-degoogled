name: Sync upstream + strip telemetry

# Pulls the latest warpdotdev/warp source every day, overlays it on top of our
# repo, then re-runs the telemetry/crash/cloud-control stripper. If the stripper
# cannot find one of its anchors (upstream refactored the telemetry code) the job
# fails and opens an issue instead of silently shipping telemetry back in.
on:
  schedule:
    - cron: "17 6 * * *" # daily, ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout our repo (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up git identity
        run: |
          git config user.name "warp-degoogled-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone latest upstream master (with LFS content)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/warpdotdev/warp.git upstream_src
          ( cd upstream_src && git lfs install --local && git lfs pull )
          echo "UPSTREAM_SHA=$(git -C upstream_src rev-parse HEAD)" >> "$GITHUB_ENV"
          rm -rf upstream_src/.git

      - name: Overlay upstream source (keep our own meta files)
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/scripts/' \
            --exclude='/vendor-upstream.sha' \
            --exclude='/README-degoogled.md' \
            upstream_src/ ./
          rm -rf upstream_src

      - name: Strip telemetry / crash reporting / cloud-control
        run: python3 scripts/strip_telemetry.py

      - name: Record upstream revision
        run: |
          printf 'warpdotdev/warp @ %s\nsynced by .github/workflows/sync-upstream.yml\n' \
            "$UPSTREAM_SHA" > vendor-upstream.sha

      - name: Commit & push if anything changed
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "Already up to date with upstream @ $UPSTREAM_SHA"
          else
            git commit -m "sync upstream @ ${UPSTREAM_SHA::10} + strip telemetry/crash/cloud-control"
            git push
          fi

      - name: Open an issue if the strip failed (telemetry drift)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = process.env.UPSTREAM_SHA || 'unknown';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Upstream sync failed — telemetry strip needs review (${sha.slice(0,10)})`,
              body: [
                'The daily upstream sync failed. The most likely cause is that',
                '`scripts/strip_telemetry.py` could not find one of its code anchors,',
                'meaning upstream refactored the telemetry, crash-reporting, or privacy code.',
                '',
                '**Do not build/ship until this is reviewed** — telemetry may be re-enabled.',
                '',
                'Fix: update the anchors in `scripts/strip_telemetry.py`, then re-run the sync.',
                '',
                `Upstream commit: \`${sha}\``,
                `Failed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
