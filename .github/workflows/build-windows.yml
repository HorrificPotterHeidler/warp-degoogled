name: Build Windows (warp-oss.exe)

# Manual only — there is intentionally NO automatic build trigger.
# Run it from the Actions tab (or `gh workflow run build-windows.yml`).
on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Cargo profile"
        type: choice
        options: [dev, release]
        default: dev

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      # Mirror upstream CI: override .cargo/config.toml rustflags (which include a
      # macOS-only linker arg that breaks MSVC linking) and keep debug info small.
      RUSTFLAGS: "-C debuginfo=line-tables-only --cfg=web_sys_unstable_apis"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout (with LFS assets)
        uses: actions/checkout@v4
        with:
          lfs: true

      # windows-latest ships MSVC + Windows SDK + CMake preinstalled, so we only
      # need the pinned Rust toolchain (rust-toolchain.toml -> 1.92.0).
      - name: Enable long paths (Warp has deep source paths)
        shell: bash
        run: git config --system core.longpaths true

      - name: Install Rust toolchain (from rust-toolchain.toml)
        shell: bash
        run: rustup show

      # A transitive build-dep (warp_multi_agent_api) compiles protobufs and needs protoc.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: warp-oss-windows

      # OSS channel feature set (from script/windows/bundle.ps1):
      #   release_bundle -> embeds fonts/assets into the binary (rust-embed/debug-embed)
      #                     so it runs standalone, no on-disk font dir needed.
      #   gui            -> the desktop UI.
      #   nld_classifier_v3,nld_heuristic_v2 -> shipped input classifier.
      # OSS deliberately omits crash_reporting (no Sentry SDK at all).
      - name: Build warp-oss (OSS channel features)
        shell: bash
        env:
          # build.rs reads this to place conpty.dll etc. next to the binary.
          CARGO_FULL_PROFILE: ${{ inputs.profile == 'release' && 'release' || 'debug' }}
          # Lets any GitHub-hosted build dep download without API rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FEATURES="release_bundle,gui,nld_classifier_v3,nld_heuristic_v2"
          if [ "${{ inputs.profile }}" = "release" ]; then
            cargo build --release --locked -p warp --bin warp-oss --features "$FEATURES"
            echo "OUTDIR=target/release" >> "$GITHUB_ENV"
          else
            cargo build --locked -p warp --bin warp-oss --features "$FEATURES"
            echo "OUTDIR=target/debug" >> "$GITHUB_ENV"
          fi

      # Assemble a self-contained portable folder: the exe plus the Windows
      # runtime files that app/build.rs copies next to it (ConPTY, DirectX
      # shader compiler, VC runtime). Fonts are embedded in the exe itself.
      - name: Stage portable package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "$OUTDIR/warp-oss.exe" dist/
          for f in conpty.dll OpenConsole.exe dxcompiler.dll dxil.dll \
                   msvcp140.dll vcruntime140.dll vcruntime140_1.dll; do
            if [ -f "$OUTDIR/$f" ]; then cp "$OUTDIR/$f" dist/; fi
          done
          echo "Staged:"; ls -la dist/

      - name: Upload warp-oss portable
        uses: actions/upload-artifact@v4
        with:
          name: warp-oss-windows-${{ inputs.profile }}-portable
          path: dist/**
          if-no-files-found: error
